[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["metadata_qa"]

[tool.coverage.report]
exclude_also = [
    "if TYPE_CHECKING:",
    "raise AssertionError\\(\"unreachable\"\\)",
    "if __name__ == .__main__.:",
]
fail_under = 75
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PERF", "RUF", "S", "SIM", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

[tool.ruff.format]
docstring-code-format = true
quote-style = "double"

[tool.mypy]
python_version = "3.13"
files = ["app.py", "metadata_qa"]
strict = true
show_error_codes = true
warn_unreachable = true

[[tool.mypy.overrides]]
module = ["flask_socketio", "kubernetes", "kubernetes.*"]
ignore_missing_imports = true
